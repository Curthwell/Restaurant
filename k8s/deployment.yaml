apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-system
  labels:
    app: reservation-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reservation-system
  template:
    metadata:
      labels:
        app: reservation-system
    spec:
      containers:
      - name: reservation-system
        image: curthwell/reservationsystem:latest
        ports:
        - containerPort: 8081
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5
